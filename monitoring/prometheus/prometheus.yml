# Prometheus Configuration for Nepal UPI (NPI)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "nepal-upi-switch"
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets:
          - host.docker.internal:8081
        labels:
          application: nepal-upi-switch
          environment: development

  - job_name: "postgres"
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: "redis"
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: "kafka"
    static_configs:
      - targets:
          - kafka-exporter:9308
