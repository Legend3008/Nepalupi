# ═══════════════════════════════════════════════════════════════
# Nepal UPI — Application Configuration
# ═══════════════════════════════════════════════════════════════

spring:
  application:
    name: nepal-upi-switch

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/nepalupi?stringtype=unspecified
    username: nepalupi
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kathmandu
        format_sql: false

  # ── Flyway Migrations ──────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes in ms

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: nepal-upi-switch
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "np.com.nepalupi.domain.event"

  # ── Jackson ─────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── Server ────────────────────────────────────────────────────
server:
  port: 8081
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator / Observability ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

# ── Nepal UPI Custom Properties ───────────────────────────────
nepalupi:
  transaction:
    expiry-minutes: 10
    per-txn-limit-paisa: 10000000      # Rs 1,00,000 (1 lakh)
    daily-limit-paisa: 20000000        # Rs 2,00,000 (2 lakh)
    daily-count-limit: 20
  settlement:
    cron: "0 59 23 * * *"              # 11:59 PM daily
  psp:
    request-expiry-seconds: 300        # 5 minutes replay window
  kafka:
    topics:
      transaction-events: transaction-events
      settlement-events: settlement-events
      notification-events: notification-events
      audit-events: audit-events

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    np.com.nepalupi: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
