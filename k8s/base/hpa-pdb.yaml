# ──────────────────────────────────────────────────────────
# Nepal UPI (NPI) — HPA + PDB
# Horizontal Pod Autoscaler and Pod Disruption Budget
# ──────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: npi-switch
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: npi-switch
  minReplicas: 3
  maxReplicas: 12
  metrics:
    # Scale on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Scale on custom TPS metric
    - type: Pods
      pods:
        metric:
          name: upi_transaction_tps
        target:
          type: AverageValue
          averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# ── Pod Disruption Budget ────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: npi-switch
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nepal-upi
      app.kubernetes.io/component: switch

---
# ── Network Policy ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: npi-switch-netpol
  namespace: npi-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nepal-upi
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8081
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8082
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    # Allow NCHL switch (external)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8583
