metadata:
  name: npi-secrets
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # echo -n 'changeme' | base64
  SPRING_DATASOURCE_USERNAME: bmVwYWx1cGk=
  SPRING_DATASOURCE_PASSWORD: Y2hhbmdlbWU=

  # Redis password (if set)
  SPRING_DATA_REDIS_PASSWORD: ""

  # NCHL credentials
  NEPALUPI_NCHL_TERMINAL_ID: TlBJMDAxMDA=
  NEPALUPI_NCHL_ACQUIRER_ID: TlBJLVNXSVRDSA==

  # ISO 8583 MAC key
  NEPALUPI_ISO8583_MAC_KEY: TlBJLURFRkFVTFQtTUFDLUtFWQ==

  # Encryption keys
  NEPALUPI_ENCRYPTION_AES_KEY: TlBJLUFFUy0yNTYtS0VZ
