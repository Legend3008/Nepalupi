# ──────────────────────────────────────────────────────────
# Nepal UPI (NPI) — ConfigMap
# Application configuration for Kubernetes deployment
# ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: npi-config
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
    app.kubernetes.io/component: config
data:
  # Spring profiles
  SPRING_PROFILES_ACTIVE: "production"

  # Server configuration
  SERVER_PORT: "8081"
  MANAGEMENT_SERVER_PORT: "8082"

  # Database configuration
  SPRING_DATASOURCE_URL: "jdbc:postgresql://npi-postgres:5432/nepalupi"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"

  # Redis configuration
  SPRING_DATA_REDIS_HOST: "npi-redis"
  SPRING_DATA_REDIS_PORT: "6379"

  # Kafka configuration
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "npi-kafka:9092"

  # NCHL configuration
  NEPALUPI_NCHL_HOST: "nchl-switch.npi.np"
  NEPALUPI_NCHL_PORT: "8583"

  # JVM options for container
  JAVA_OPTS: >-
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=200
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:InitialRAMPercentage=50.0
    -Djava.security.egd=file:/dev/./urandom

  # Timezone
  TZ: "Asia/Kathmandu"
