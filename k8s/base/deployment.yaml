# ──────────────────────────────────────────────────────────
# Nepal UPI (NPI) — Deployment
# Section 13: Container orchestration with HA
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npi-switch
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
    app.kubernetes.io/component: switch
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nepal-upi
      app.kubernetes.io/component: switch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nepal-upi
        app.kubernetes.io/component: switch
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: npi-switch
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60

      # Anti-affinity: spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - nepal-upi
                topologyKey: kubernetes.io/hostname

      # Topology spread constraint for zone distribution
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nepal-upi

      containers:
        - name: npi-switch
          image: ghcr.io/legend3008/nepalupi:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: management
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: npi-config
            - secretRef:
                name: npi-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          # Startup probe: allow 120s for initial startup
          startupProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 9

          # Liveness probe: restart if unhealthy
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe: stop traffic if not ready
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service Account ───────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: npi-switch
  namespace: npi-system
  labels:
    app.kubernetes.io/name: nepal-upi
